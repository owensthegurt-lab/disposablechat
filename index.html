<!DOCTYPE html>
<html>

<head>

    <title>Disposable Chat</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="menu" id="menu">


    <h1>
        Disposable Chat
    </h1>


    <p>
        Temporary conversations.
        No history saved.
    </p>


    <button id="createBtn">
        Create Party
    </button>


    <button id="joinBtn">
        Join Party
    </button>


</div>





<script>


console.log("DISPOSABLE CHAT LOADED");



const menu =
document.getElementById("menu");


const createBtn =
document.getElementById("createBtn");


const joinBtn =
document.getElementById("joinBtn");





function generateCode(){


    const chars =
    "ABCDEFGHJKLMNPQRSTUVWXYZ123456789";


    let code = "";


    for(let i = 0; i < 5; i++){


        code += chars[

            Math.floor(

                Math.random() *
                chars.length

            )

        ];


    }


    return code;

}





function generateUsername(){


    const first = [

        "Silent",
        "Golden",
        "Shadow",
        "Frozen",
        "Swift",
        "Dark",
        "Bright",
        "Hidden",
        "Wild",
        "Silver"

    ];



    const second = [

        "Wolf",
        "Fox",
        "River",
        "Tree",
        "Moon",
        "Storm",
        "Leaf",
        "Bear",
        "Fire",
        "Cloud"

    ];



    return (

        first[Math.floor(Math.random()*first.length)]

        +

        second[Math.floor(Math.random()*second.length)]

    );


}






createBtn.onclick = function(){


    openChat(
        generateCode()
    );


};






joinBtn.onclick = function(){


    menu.innerHTML = `


    <h1>
        Join Party
    </h1>


    <input 
    id="joinCode"
    placeholder="ENTER CODE"
    maxlength="5"
    >


    <button id="joinConfirm">

        Join

    </button>


    `;



    document
    .getElementById("joinConfirm")
    .onclick = function(){


        let code =
        document
        .getElementById("joinCode")
        .value
        .toUpperCase();



        openChat(code);



    };


};







function openChat(code){



const username =
generateUsername();




menu.innerHTML = `



<div class="chat-layout">





<div class="sidebar">


    <div class="server-title">

        Party ${code}

    </div>



    <div class="members">


        <h3>
            Members
        </h3>


        <p>
            ${username}
        </p>


        <p>
            Waiting...
        </p>


        <p>
            Waiting...
        </p>


    </div>



    <div class="sidebar-bottom">


        <p>
            Self Destruct:
        </p>


        <p id="timer">

            05:00

        </p>



        <button id="endBtn">

            End Chat

        </button>


    </div>



</div>








<div class="chat">


    <div class="chat-header">


        # party-chat


    </div>





    <div class="messages" id="messages">


        <p>

        System: Connected

        </p>


    </div>





    <div class="typing" id="typing">

    </div>





    <div class="message-box">


        <input

        id="messageInput"

        placeholder="Message #party-chat"

        >



        <button id="sendBtn">

        Send

        </button>


    </div>



</div>





</div>




`;





const input =
document.getElementById("messageInput");

const messages =
document.getElementById("messages");

const typing =
document.getElementById("typing");







input.oninput = function(){


    if(input.value.length > 0){


        typing.innerHTML =
        username +
        " is typing...";


    }

    else{


        typing.innerHTML = "";


    }


};








document
.getElementById("sendBtn")
.onclick = function(){



if(input.value.trim()==="")
return;



messages.innerHTML += `


<p>

<b>${username}</b>

${input.value}

</p>


`;



input.value="";

typing.innerHTML="";


};








let time = 300;



let countdown =
setInterval(()=>{



time--;



let min =
Math.floor(time/60);


let sec =
time%60;



document
.getElementById("timer")
.innerHTML =

min +

":" +

(sec < 10 ? "0":"") +

sec;





if(time <=0){


clearInterval(countdown);

destroyChat();


}


},1000);









document
.getElementById("endBtn")
.onclick=function(){


clearInterval(countdown);

destroyChat();


};





}





function destroyChat(){


menu.innerHTML = `


<h1>
Chat Destroyed
</h1>


<p>
All messages deleted.
</p>


<button onclick="location.reload()">

Return

</button>


`;


}





</script>


</body>

</html>
