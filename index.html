<!DOCTYPE html>
<html>

<head>

    <title>Disposable Chat</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="menu" id="menu">

    <h1>
        Disposable Chat
    </h1>

    <p>
        Temporary conversations.
        No history saved.
    </p>


    <button id="createBtn">
        Create Party
    </button>


    <button id="joinBtn">
        Join Party
    </button>


</div>



<script>


console.log("CHAT SYSTEM LOADED");



const menu =
document.getElementById("menu");


const createBtn =
document.getElementById("createBtn");


const joinBtn =
document.getElementById("joinBtn");




function generateCode(){


    const chars =
    "ABCDEFGHJKLMNPQRSTUVWXYZ123456789";


    let code = "";


    for(let i = 0; i < 5; i++){


        code += chars[

            Math.floor(

                Math.random() *
                chars.length

            )

        ];


    }


    return code;


}




/*
====================================
CREATE PARTY
====================================
*/


createBtn.onclick = function(){


    const code =
    generateCode();


    openChat(code);


};





/*
====================================
JOIN PARTY
====================================
*/


joinBtn.onclick = function(){


    menu.innerHTML = `


        <h1>
            Join Party
        </h1>


        <input

            id="joinCode"

            placeholder="ENTER CODE"

            maxlength="5"

        >


        <br><br>


        <button id="joinConfirm">

            Join

        </button>


    `;




    document
    .getElementById("joinConfirm")
    .onclick = function(){



        const code =

        document
        .getElementById("joinCode")
        .value
        .toUpperCase();




        if(code.length !== 5){


            alert(
                "Enter a 5 character code"
            );


            return;


        }




        openChat(code);



    };



};







/*
====================================
CHAT ROOM
====================================
*/


function openChat(code){



    menu.innerHTML = `


        <h1>
            Party ${code}
        </h1>



        <div id="messages">


            <p>
                Connected
            </p>


        </div>



        <p id="typing">

        </p>



        <input

            id="messageInput"

            placeholder="Type message..."

        >



        <button id="sendBtn">

            Send

        </button>



        <button id="endBtn">

            End Chat

        </button>



    `;





    const input =
    document.getElementById("messageInput");



    const typing =
    document.getElementById("typing");




    input.oninput = function(){



        if(input.value.length > 0){


            typing.innerHTML =
            "You are typing...";


        }

        else{


            typing.innerHTML =
            "";


        }



    };






    document
    .getElementById("sendBtn")
    .onclick = function(){



        if(input.value.trim() === "")
            return;




        const messages =
        document.getElementById("messages");



        messages.innerHTML += `


            <p>

            You: ${input.value}

            </p>


        `;




        input.value = "";

        typing.innerHTML = "";



    };






    document
    .getElementById("endBtn")
    .onclick = function(){



        menu.innerHTML = `


            <h1>
                Chat Ended
            </h1>


            <p>
                Chat history deleted.
            </p>



            <button onclick="location.reload()">

                Return

            </button>


        `;



    };



}



</script>


</body>

</html>
