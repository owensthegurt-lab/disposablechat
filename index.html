<!DOCTYPE html>
<html>

<head>

    <title>Disposable Chat</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="menu" id="menu">

    <h1>
        Disposable Chat
    </h1>


    <p>
        Temporary conversations.
        No history saved.
    </p>


    <button id="createBtn">
        Create Party
    </button>


    <button id="joinBtn">
        Join Party
    </button>


</div>



<script>


console.log("DISPOSABLE CHAT LOADED");



const menu =
document.getElementById("menu");


const createBtn =
document.getElementById("createBtn");


const joinBtn =
document.getElementById("joinBtn");





/*
====================================
PARTY CODE
====================================
*/


function generateCode(){


    const chars =
    "ABCDEFGHJKLMNPQRSTUVWXYZ123456789";


    let code = "";


    for(let i = 0; i < 5; i++){


        code += chars[

            Math.floor(

                Math.random() *
                chars.length

            )

        ];


    }


    return code;


}






/*
====================================
USERNAME GENERATOR
====================================
*/


function generateUsername(){


    const first = [

        "Silent",
        "Golden",
        "Shadow",
        "Frozen",
        "Swift",
        "Dark",
        "Bright",
        "Hidden",
        "Wild",
        "Silver"

    ];



    const second = [

        "Wolf",
        "Fox",
        "River",
        "Tree",
        "Moon",
        "Storm",
        "Leaf",
        "Bear",
        "Fire",
        "Cloud"

    ];



    return (

        first[

            Math.floor(
                Math.random()*first.length
            )

        ]

        +

        second[

            Math.floor(
                Math.random()*second.length
            )

        ]

    );


}






/*
====================================
CREATE PARTY
====================================
*/


createBtn.onclick = function(){


    const code =
    generateCode();



    openChat(code);



};






/*
====================================
JOIN PARTY
====================================
*/


joinBtn.onclick = function(){


    menu.innerHTML = `


        <h1>
            Join Party
        </h1>



        <input

            id="joinCode"

            maxlength="5"

            placeholder="ENTER CODE"

        >



        <br><br>



        <button id="joinConfirm">

            Join

        </button>


    `;



    document
    .getElementById("joinConfirm")
    .onclick = function(){



        const code =

        document
        .getElementById("joinCode")
        .value
        .toUpperCase();



        if(code.length !== 5){

            alert(
                "Invalid code"
            );

            return;

        }



        openChat(code);



    };



};









/*
====================================
CHAT ROOM
====================================
*/


function openChat(code){



    const username =
    generateUsername();



    menu.innerHTML = `



        <h1>
            Party ${code}
        </h1>



        <p>
            You are:
            <b>${username}</b>
        </p>




        <p id="timer">

            Time Remaining:
            05:00

        </p>





        <div id="messages">


            <p>
                System:
                Connected
            </p>


        </div>





        <p id="typing">

        </p>





        <input

            id="messageInput"

            placeholder="Type message..."

        >




        <button id="sendBtn">

            Send

        </button>




        <button id="endBtn">

            End Chat

        </button>



    `;





    const input =
    document.getElementById("messageInput");



    const messages =
    document.getElementById("messages");



    const typing =
    document.getElementById("typing");





    /*
    ================================
    SELF DESTRUCT TIMER
    ================================
    */


    let timeLeft = 300;



    const timer =
    setInterval(() => {



        timeLeft--;



        let minutes =
        Math.floor(timeLeft / 60);



        let seconds =
        timeLeft % 60;



        document
        .getElementById("timer")
        .innerHTML =

        "Time Remaining: "

        +

        minutes

        +

        ":"

        +

        (seconds < 10 ? "0" : "")

        +

        seconds;




        if(timeLeft <= 0){



            clearInterval(timer);


            destroyChat();



        }



    },1000);








    /*
    ================================
    TYPING
    ================================
    */


    input.oninput = function(){



        if(input.value.length > 0){


            typing.innerHTML =
            username +
            " is typing...";


        }

        else{


            typing.innerHTML = "";


        }



    };







    /*
    ================================
    SEND MESSAGE
    ================================
    */


    document
    .getElementById("sendBtn")
    .onclick = function(){



        if(input.value.trim() === "")
            return;




        messages.innerHTML += `


            <p>

            <b>${username}:</b>

            ${input.value}

            </p>


        `;




        input.value = "";

        typing.innerHTML = "";



    };







    /*
    ================================
    END CHAT
    ================================
    */


    document
    .getElementById("endBtn")
    .onclick = function(){


        clearInterval(timer);


        destroyChat();


    };






}





function destroyChat(){



    menu.innerHTML = `


        <h1>
            Chat Destroyed
        </h1>



        <p>
            All messages have been deleted.
        </p>



        <button onclick="location.reload()">

            Return

        </button>



    `;


}



</script>


</body>

</html>
