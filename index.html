<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Disposable Chat</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>


    <!--
    ====================================
    MAIN MENU
    ====================================
    -->

    <div id="menu" class="menu">

        <h1>Disposable Chat</h1>

        <p>
            Temporary parties.
            No chat history.
        </p>

        <div class="menu-buttons">

            <button id="createBtn">

                Create Party

            </button>

            <button id="joinBtn">

                Join Party

            </button>

        </div>

    </div>




    <!--
    ====================================
    JOIN PARTY MODAL
    ====================================
    -->

    <div
        id="joinModal"
        class="hidden"
    >

        <div class="modal">

            <h2>

                Join Party

            </h2>

            <input

                id="joinCode"

                maxlength="5"

                placeholder="ABCDE"

                autocomplete="off"

            >

            <div class="modal-buttons">

                <button id="confirmJoin">

                    Join

                </button>

                <button id="cancelJoin">

                    Cancel

                </button>

            </div>

        </div>

    </div>





    <!--
    ====================================
    CHAT
    ====================================
    -->

    <div
        id="chat"
        class="hidden"
    >



        <!-- Sidebar -->

        <aside id="sidebar">



            <div class="server-name">

                Disposable Chat

            </div>



            <div class="party-info">

                <h3>

                    Party

                </h3>

                <p id="partyCode">

                    -----

                </p>

            </div>




            <div class="member-list">

                <h3>

                    Members

                </h3>

                <div id="members">

                </div>

            </div>




            <div class="timer">

                <h3>

                    Self Destruct

                </h3>

                <p id="timer">

                    05:00

                </p>

            </div>




            <button id="leaveBtn">

                End Chat

            </button>



        </aside>






        <!-- Main Chat -->

        <main id="chatArea">



            <header id="chatHeader">

                <span>

                    # party-chat

                </span>

            </header>





            <section
                id="messages"
            >

            </section>





            <div
                id="typing"
            >

            </div>





            <footer id="messageBar">



                <input

                    id="messageInput"

                    placeholder="Message #party-chat"

                    autocomplete="off"

                >



                <button id="sendBtn">

                    Send

                </button>



            </footer>



        </main>



    </div>






    <!-- Socket.IO -->

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>


    <!-- Main JS -->

    <script src="main.js"></script>


</body>

</html>
